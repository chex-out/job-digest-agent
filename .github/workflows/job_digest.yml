name: Weekly Job Market Digest

on:
  schedule:
    - cron: '0 0 * * 6'  # Every Saturday at 8:00 AM Singapore time (UTC+8 = 00:00 UTC)
  workflow_dispatch:       # Allows manual trigger from GitHub Actions tab

jobs:
  run_digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestor agent
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python agents/ingestor.py

      - name: Commit updated input listings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main
          git add config/input_listings.yaml || true
          git diff --staged --quiet || git commit -m "Ingestor — updated input listings $(date +'%y%m%d')"
          git push

      - name: Run scout agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
        run: python agents/scout.py

      - name: Run preparer agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_OAUTH_TOKEN: ${{ secrets.GOOGLE_OAUTH_TOKEN }}
        run: python agents/preparer.py

      - name: Run digest agent
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python agents/digest.py

      - name: Archive processed listings
        run: python -c "from agents.ingestor import archive_processed_listings; archive_processed_listings()"

      - name: Commit archived listings and outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main
          git add config/input_listings.yaml || true
          git add config/processed_listings.yaml || true
          git add output/ || true
          git diff --staged --quiet || git commit -m "Weekly run — $(date +'%y%m%d')"
          git push

  run_synthesiser:
    runs-on: ubuntu-latest
    needs: run_digest  # Runs after digest job completes

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run synthesiser agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python agents/synthesiser.py

      - name: Commit updated feedback log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main
          git add config/feedback_log.yaml || true
          git add config/user_profile_proposed.yaml || true
          git add output/ || true
          git diff --staged --quiet || git commit -m "Weekly synthesis — $(date +'%y%m%d')"
          git push
