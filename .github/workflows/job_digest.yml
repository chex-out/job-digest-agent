name: Weekly Job Market Digest

on:
  schedule:
    - cron: '0 0 * * 6'  # Every Saturday at 8:00 AM Singapore time (UTC+8 = 00:00 UTC)
  workflow_dispatch:       # Allows manual trigger from GitHub Actions tab

jobs:
  run_digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scout agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_PHONE: ${{ secrets.TELEGRAM_PHONE }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
        run: python agents/scout.py

      - name: Run preparer agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python agents/preparer.py

      - name: Run digest agent
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python agents/digest.py

  run_synthesiser:
    runs-on: ubuntu-latest
    needs: run_digest  # Runs after digest job completes

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run synthesiser agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python agents/synthesiser.py

      - name: Commit updated feedback log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/feedback_log.yaml || true
          git add config/user_profile_proposed.yaml || true
          git add output/ || true
          git diff --staged --quiet || git commit -m "Weekly synthesis — $(date +'%y%m%d')"
          git push
