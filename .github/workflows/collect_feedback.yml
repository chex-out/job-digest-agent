name: Collect Feedback

on:
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run synthesiser agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_OAUTH_TOKEN: ${{ secrets.GOOGLE_OAUTH_TOKEN }}
        run: python agents/synthesiser.py

      - name: Commit feedback and synthesis outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/feedback_log.yaml || true
          git add config/application_feedback_log.yaml || true
          git add config/user_profile_proposed.yaml || true
          git add output/ || true
          git diff --staged --quiet || git commit -m "Feedback collection — $(date +'%y%m%d')"
          git push --force-with-lease
          git add config/processed_reply_ids.yaml || true
